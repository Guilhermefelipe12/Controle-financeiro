<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Controle Financeiro — Família Silva</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700&family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,500;0,9..144,700;1,9..144,400&display=swap" rel="stylesheet">
<style>
:root{--bg:#F7F6F2;--card:#FFF;--green-deep:#0B3D2E;--green-mid:#1A7D5A;--green-light:#2CB67D;--green-pale:#E8F5EE;--amber:#E8A817;--amber-pale:#FFF8E7;--red:#D94F4F;--red-pale:#FDECEC;--blue:#3B82F6;--blue-pale:#EFF6FF;--text-primary:#1A1A18;--text-secondary:#6B6B65;--text-muted:#A3A39B;--border:#E8E8E2;--shadow-sm:0 1px 3px rgba(0,0,0,.04),0 1px 2px rgba(0,0,0,.06);--shadow-md:0 4px 16px rgba(0,0,0,.06),0 1px 4px rgba(0,0,0,.04);--shadow-lg:0 12px 40px rgba(0,0,0,.08);--radius:16px;--radius-sm:10px}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:'DM Sans',system-ui,sans-serif;background:var(--bg);color:var(--text-primary);min-height:100dvh;overflow-x:hidden;-webkit-font-smoothing:antialiased}

.hero{background:linear-gradient(160deg,#0B3D2E 0%,#145A3F 50%,#1A7D5A 100%);padding:48px 24px 36px;position:relative;overflow:hidden}
.hero::before{content:'';position:absolute;top:-60%;right:-30%;width:300px;height:300px;background:radial-gradient(circle,rgba(44,182,125,.25) 0%,transparent 70%);border-radius:50%}
.hero::after{content:'';position:absolute;bottom:-40%;left:-20%;width:250px;height:250px;background:radial-gradient(circle,rgba(232,168,23,.15) 0%,transparent 70%);border-radius:50%}
.hero-label{display:inline-flex;align-items:center;gap:6px;background:rgba(255,255,255,.12);backdrop-filter:blur(8px);padding:6px 14px;border-radius:100px;font-size:12px;font-weight:500;color:rgba(255,255,255,.85);margin-bottom:20px;letter-spacing:.02em}
.hero-label .dot{width:6px;height:6px;background:var(--green-light);border-radius:50%}
.hero h1{font-family:'Fraunces',serif;font-size:32px;font-weight:500;color:#fff;line-height:1.15;margin-bottom:8px;position:relative;z-index:1}
.hero h1 em{font-style:italic;color:var(--green-light)}
.hero p{font-size:14px;color:rgba(255,255,255,.6);line-height:1.5;position:relative;z-index:1}

.saldo-strip{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;padding:0 16px;margin-top:-24px;position:relative;z-index:2}
.saldo-card{background:var(--card);border-radius:var(--radius);padding:14px;box-shadow:var(--shadow-md)}
.saldo-card.full{grid-column:1/-1}
.saldo-label{font-size:10px;color:var(--text-muted);font-weight:500;text-transform:uppercase;letter-spacing:.05em;margin-bottom:3px}
.saldo-value{font-family:'Fraunces',serif;font-size:22px;font-weight:500;line-height:1.2}
.saldo-value.positive{color:var(--green-mid)}.saldo-value.negative{color:var(--red)}.saldo-value.neutral{color:var(--text-primary)}
.saldo-sub{font-size:10px;color:var(--text-muted);margin-top:2px}
.progress-bar{height:6px;background:var(--border);border-radius:3px;overflow:hidden;margin-top:8px}
.progress-fill{height:100%;border-radius:3px;transition:width .6s cubic-bezier(.16,1,.3,1)}
.progress-fill.green{background:var(--green-light)}.progress-fill.amber{background:var(--amber)}.progress-fill.red{background:var(--red)}

.tabs{display:flex;gap:4px;padding:16px 16px 0;overflow-x:auto;scrollbar-width:none}
.tabs::-webkit-scrollbar{display:none}
.tab{flex-shrink:0;padding:10px 14px;border-radius:100px;border:none;font-family:'DM Sans',sans-serif;font-size:12px;font-weight:500;cursor:pointer;transition:all .2s;background:var(--card);color:var(--text-secondary);box-shadow:var(--shadow-sm)}
.tab.active{background:var(--green-deep);color:#fff;box-shadow:0 4px 12px rgba(11,61,46,.3)}

.section{padding:20px 16px}
.section-title{font-size:13px;font-weight:600;color:var(--text-muted);text-transform:uppercase;letter-spacing:.06em;margin-bottom:12px;display:flex;align-items:center;gap:8px}
.section-title::before{content:'';width:3px;height:14px;background:var(--green-light);border-radius:2px}
.section-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}

.register-card{background:var(--card);border-radius:var(--radius);padding:20px;box-shadow:var(--shadow-md);margin-bottom:12px}
.category-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:16px}
.cat-btn{display:flex;flex-direction:column;align-items:center;gap:4px;padding:12px 4px;border-radius:var(--radius-sm);border:2px solid var(--border);background:var(--bg);font-family:'DM Sans',sans-serif;font-size:10px;font-weight:500;color:var(--text-secondary);cursor:pointer;transition:all .15s}
.cat-btn .cat-icon{font-size:22px}
.cat-btn.selected{border-color:var(--green-mid);background:var(--green-pale);color:var(--green-deep)}

.input-row{display:flex;gap:8px;margin-bottom:12px}
.money-input{flex:1;position:relative}
.money-input .prefix{position:absolute;left:14px;top:50%;transform:translateY(-50%);font-size:14px;font-weight:600;color:var(--text-muted)}
.money-input input{width:100%;padding:14px 14px 14px 44px;border-radius:var(--radius-sm);border:2px solid var(--border);font-family:'DM Sans',sans-serif;font-size:20px;font-weight:600;color:var(--text-primary);background:var(--bg);outline:none;transition:border-color .15s}
.money-input input:focus{border-color:var(--green-mid)}
.money-input input::placeholder{color:var(--text-muted);font-weight:400;font-size:16px}
.desc-input,.date-input{width:100%;padding:12px 14px;border-radius:var(--radius-sm);border:1.5px solid var(--border);font-family:'DM Sans',sans-serif;font-size:14px;color:var(--text-primary);background:var(--bg);outline:none;transition:border-color .15s;margin-bottom:12px}
.desc-input:focus,.date-input:focus{border-color:var(--green-mid)}
.btn-register{width:100%;padding:16px;border-radius:var(--radius-sm);border:none;background:linear-gradient(135deg,var(--green-deep),var(--green-mid));color:#fff;font-family:'DM Sans',sans-serif;font-size:15px;font-weight:600;cursor:pointer;box-shadow:0 4px 16px rgba(11,61,46,.3);transition:all .15s}
.btn-register:active{transform:scale(.98)}

.envelope-card{background:var(--card);border-radius:var(--radius);padding:14px 16px;box-shadow:var(--shadow-sm);margin-bottom:8px;display:flex;align-items:center;gap:12px}
.envelope-icon{font-size:28px;flex-shrink:0}
.envelope-info{flex:1;min-width:0}
.envelope-name{font-size:14px;font-weight:500}
.envelope-bar{height:5px;background:var(--border);border-radius:3px;margin-top:6px;overflow:hidden}
.envelope-amounts{text-align:right;flex-shrink:0}
.envelope-spent{font-family:'Fraunces',serif;font-size:16px;font-weight:500}
.envelope-budget{font-size:11px;color:var(--text-muted)}

.status-badge{display:inline-flex;align-items:center;gap:4px;padding:3px 8px;border-radius:100px;font-size:10px;font-weight:600;letter-spacing:.03em}
.status-badge.ok{background:var(--green-pale);color:var(--green-mid)}
.status-badge.warn{background:var(--amber-pale);color:#946800}
.status-badge.danger{background:var(--red-pale);color:var(--red)}

.history-item{display:flex;align-items:center;gap:10px;padding:12px 0;border-bottom:1px solid var(--border)}
.history-item:last-child{border-bottom:none}
.history-icon{width:38px;height:38px;border-radius:10px;background:var(--bg);display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.history-info{flex:1;min-width:0}
.history-desc{font-size:13px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.history-meta{font-size:11px;color:var(--text-muted)}
.history-value{font-family:'Fraunces',serif;font-size:15px;font-weight:500;flex-shrink:0}
.history-value.out{color:var(--red)}.history-value.in{color:var(--green-mid)}

.fixed-item{display:flex;align-items:center;gap:10px;padding:12px 0;border-bottom:1px solid var(--border)}
.fixed-check{width:24px;height:24px;border-radius:7px;border:2px solid var(--border);display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .15s;font-size:13px;color:#fff;cursor:pointer}
.fixed-check.checked{background:var(--green-light);border-color:var(--green-light)}
.fixed-name{flex:1;font-size:14px;cursor:pointer}
.fixed-name.done{text-decoration:line-through;opacity:.5}
.fixed-val{font-family:'Fraunces',serif;font-size:14px;font-weight:500}
.fixed-due{font-size:10px;color:var(--text-muted);background:var(--bg);padding:2px 6px;border-radius:4px}

.week-selector{display:flex;gap:6px;margin-bottom:16px}
.week-btn{flex:1;padding:10px 0;border-radius:var(--radius-sm);border:2px solid var(--border);background:var(--card);font-family:'DM Sans',sans-serif;font-size:13px;font-weight:600;color:var(--text-secondary);cursor:pointer;transition:all .15s;text-align:center}
.week-btn.active{border-color:var(--green-mid);background:var(--green-pale);color:var(--green-deep)}

.view-toggle{display:flex;gap:4px;margin-bottom:16px;background:var(--border);border-radius:8px;padding:3px}
.view-toggle-btn{flex:1;padding:8px;border:none;border-radius:6px;font-family:'DM Sans',sans-serif;font-size:12px;font-weight:600;cursor:pointer;transition:all .15s;background:transparent;color:var(--text-muted)}
.view-toggle-btn.active{background:var(--card);color:var(--text-primary);box-shadow:var(--shadow-sm)}

.pend-item{display:flex;align-items:flex-start;gap:10px;padding:12px 0;border-bottom:1px solid var(--border)}
.pend-text{flex:1;font-size:14px;line-height:1.4;cursor:pointer}
.pend-text.done{text-decoration:line-through;opacity:.5}

.toast{position:fixed;bottom:30px;left:50%;transform:translateX(-50%) translateY(100px);background:var(--green-deep);color:#fff;padding:14px 24px;border-radius:100px;font-size:14px;font-weight:500;box-shadow:var(--shadow-lg);z-index:100;transition:transform .4s cubic-bezier(.16,1,.3,1);white-space:nowrap}
.toast.show{transform:translateX(-50%) translateY(0)}

@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
.animate-in{animation:fadeUp .5s cubic-bezier(.16,1,.3,1) forwards}
.delay-1{animation-delay:.05s;opacity:0}.delay-2{animation-delay:.1s;opacity:0}.delay-3{animation-delay:.15s;opacity:0}

.month-select{padding:8px 12px;border-radius:8px;border:1.5px solid var(--border);font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;color:var(--text-primary);background:var(--card);outline:none}

.summary-footer{background:var(--card);border-radius:var(--radius);padding:16px 20px;box-shadow:var(--shadow-sm);margin-top:8px}
.summary-row{display:flex;justify-content:space-between;align-items:center;padding:6px 0}
.summary-row.total{border-top:2px solid var(--border);margin-top:6px;padding-top:12px}
.summary-label{font-size:13px;color:var(--text-secondary)}
.summary-val{font-family:'Fraunces',serif;font-size:16px;font-weight:500}

.empty-state{text-align:center;padding:32px 16px;color:var(--text-muted);font-size:13px}
.empty-state .big-icon{font-size:40px;margin-bottom:8px;display:block}
.bottom-spacer{height:40px}

.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:50;display:flex;align-items:flex-end;justify-content:center;animation:fadeIn .2s}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.modal-sheet{background:var(--card);border-radius:20px 20px 0 0;width:100%;max-width:640px;max-height:85dvh;overflow-y:auto;padding:24px 20px 32px;animation:slideUp .3s cubic-bezier(.16,1,.3,1)}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.modal-handle{width:36px;height:4px;background:var(--border);border-radius:2px;margin:0 auto 16px}
.modal-title{font-size:18px;font-weight:600;margin-bottom:16px}
.form-label{font-size:12px;font-weight:600;color:var(--text-muted);text-transform:uppercase;letter-spacing:.05em;margin-bottom:6px;display:block}
.form-input{width:100%;padding:12px 14px;border-radius:var(--radius-sm);border:1.5px solid var(--border);font-family:'DM Sans',sans-serif;font-size:14px;color:var(--text-primary);background:var(--bg);outline:none;margin-bottom:14px}
.form-input:focus{border-color:var(--green-mid)}
.emoji-picker{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px}
.emoji-opt{width:42px;height:42px;border-radius:10px;border:2px solid var(--border);background:var(--bg);font-size:20px;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .15s}
.emoji-opt.sel{border-color:var(--green-mid);background:var(--green-pale)}
.btn-save{width:100%;padding:14px;border-radius:var(--radius-sm);border:none;background:linear-gradient(135deg,var(--green-deep),var(--green-mid));color:#fff;font-family:'DM Sans',sans-serif;font-size:15px;font-weight:600;cursor:pointer;margin-top:4px}
.btn-outline{width:100%;padding:12px;border-radius:var(--radius-sm);border:1.5px solid var(--border);background:none;color:var(--text-secondary);font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;cursor:pointer;margin-top:8px}
.btn-danger-outline{width:100%;padding:12px;border-radius:var(--radius-sm);border:1.5px solid var(--red);background:none;color:var(--red);font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;cursor:pointer;margin-top:8px}
.edit-icon{width:28px;height:28px;border-radius:7px;border:1.5px solid var(--border);background:var(--bg);display:flex;align-items:center;justify-content:center;font-size:13px;cursor:pointer;flex-shrink:0;transition:all .15s;color:var(--text-muted)}
.edit-icon:active{background:var(--border)}
.add-btn{display:flex;align-items:center;justify-content:center;gap:6px;width:100%;padding:14px;border-radius:var(--radius);border:2px dashed var(--border);background:none;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;color:var(--text-muted);cursor:pointer;transition:all .15s;margin-top:8px}
.add-btn:active{background:var(--bg);border-color:var(--green-mid);color:var(--green-mid)}
.income-edit{display:flex;gap:8px;align-items:center;padding:10px 14px;background:var(--green-pale);border-radius:var(--radius-sm);margin-bottom:12px;cursor:pointer}
.income-edit:active{opacity:.8}

.income-entry{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--border)}
.income-entry:last-child{border-bottom:none}
</style>
</head>
<body>
<div id="app"></div>
<script>
const SK='familia-silva-fin-v6';
const MONTHS=['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];
const EMOJIS=['🛒','⛽','💊','👶','🍽️','🏠','🎵','📦','🚗','💰','🏥','🎓','👕','🐾','🍺','☕','📱','✂️','🧹','🔧','💡','🎁','🏋️','💅'];

const DEF_CATS=[
  {id:'mercado',name:'Mercado',icon:'🛒',weekBudget:550},
  {id:'gasolina',name:'Gasolina',icon:'⛽',weekBudget:350},
  {id:'farmacia',name:'Farmácia',icon:'💊',weekBudget:75},
  {id:'fraldas',name:'Fraldas/Bebê',icon:'👶',weekBudget:150},
  {id:'alimentacao',name:'Alimentação',icon:'🍽️',weekBudget:100},
  {id:'limpeza',name:'Limpeza',icon:'🏠',weekBudget:600},
  {id:'musica',name:'Aula música',icon:'🎵',weekBudget:100},
  {id:'imprevistos',name:'Imprevistos',icon:'📦',weekBudget:50},
];
const DEF_FIXED=[
  {id:'f0',name:'Colégio Avelie',val:2100,dueDay:10},
  {id:'f1',name:'Condomínio',val:1050,dueDay:15},
  {id:'f2',name:'IPTU (Paineiras + Sucupira)',val:870,dueDay:10},
  {id:'f3',name:'Luz (casa + edícola)',val:362,dueDay:20},
  {id:'f4',name:'Água',val:33,dueDay:20},
  {id:'f5',name:'Internet Vivo',val:396,dueDay:15},
  {id:'f6',name:'Starlink',val:236,dueDay:15},
  {id:'f7',name:'Elias (jardinagem)',val:1200,dueDay:5},
  {id:'f8',name:'Seguros carro',val:1068,dueDay:15},
  {id:'f9',name:'Dízimo',val:1200,dueDay:1},
  {id:'f10',name:'Doações',val:900,dueDay:5},
  {id:'f11',name:'Thiago (tênis)',val:400,dueDay:1},
  {id:'f12',name:'Quartel / Felipe Vilhena',val:150,dueDay:1},
  {id:'f13',name:'Assinaturas digitais',val:784,dueDay:1},
];

function load(){
  try{const r=localStorage.getItem(SK);if(r){const d=JSON.parse(r);
    if(!d.categories)d.categories=JSON.parse(JSON.stringify(DEF_CATS));
    if(!d.fixedExpenses)d.fixedExpenses=JSON.parse(JSON.stringify(DEF_FIXED));
    if(!d.income)d.income=16500;
    if(!d.expenses)d.expenses=[];
    if(!d.incomes)d.incomes=[];
    if(!d.fixedPaid)d.fixedPaid={};
    if(!d.pendencias)d.pendencias=[];
    // ensure dueDay on fixed
    d.fixedExpenses.forEach(f=>{if(!f.dueDay)f.dueDay=1;});
    // ensure date on expenses
    d.expenses.forEach(e=>{if(!e.date)e.date='';});
    return d;
  }}catch(e){}
  return{categories:JSON.parse(JSON.stringify(DEF_CATS)),fixedExpenses:JSON.parse(JSON.stringify(DEF_FIXED)),income:16500,expenses:[],incomes:[],fixedPaid:{},pendencias:[]};
}
function save(){try{localStorage.setItem(SK,JSON.stringify(D));}catch(e){}}
const fmt=v=>'R$ '+Math.abs(Math.round(v)).toLocaleString('pt-BR');
const today=()=>{const d=new Date();return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');};
const fmtDate=d=>{if(!d)return'';const p=d.split('-');return p[2]+'/'+p[1];};
const fmtDateFull=d=>{if(!d)return'';const p=d.split('-');return p[2]+'/'+p[1]+'/'+p[0];};
const dateMonth=d=>{if(!d)return-1;return parseInt(d.split('-')[1])-1;};
const dateWeek=d=>{if(!d)return 1;return Math.min(Math.ceil(parseInt(d.split('-')[2])/7),5);};

let D=load();
let S={tab:'registrar',month:new Date().getMonth(),week:Math.min(Math.ceil(new Date().getDate()/7),5),selCat:D.categories[0]?.id||'',inputVal:'',inputDesc:'',inputDate:today(),envView:'week',modal:null};

function cats(){return D.categories;}
function fixed(){return D.fixedExpenses;}
function fixTot(){return fixed().reduce((a,b)=>a+b.val,0);}
function wkTot(){return cats().reduce((a,b)=>a+b.weekBudget,0);}
function exM(m){return D.expenses.filter(e=>{if(e.date)return dateMonth(e.date)===m;return e.month===m;});}
function exW(m,w){return D.expenses.filter(e=>{if(e.date)return dateMonth(e.date)===m&&dateWeek(e.date)===w;return e.month===m&&e.week===w;});}
function catW(m,w,c){return exW(m,w).filter(e=>e.cat===c).reduce((a,b)=>a+b.val,0);}
function catM(m,c){return exM(m).filter(e=>e.cat===c).reduce((a,b)=>a+b.val,0);}
function wkS(m,w){return exW(m,w).reduce((a,b)=>a+b.val,0);}
function moV(m){return exM(m).reduce((a,b)=>a+b.val,0);}
function incM(m){return D.incomes.filter(i=>dateMonth(i.date)===m);}
function incMT(m){return incM(m).reduce((a,b)=>a+b.val,0);}
function pc(s,b){if(!b)return'green';const p=s/b;return p<=.5?'green':p<=.8?'amber':'red';}
function st(s,b){if(!b)return{t:'—',c:'ok'};const p=s/b;return p<=.5?{t:'Tranquilo',c:'ok'}:p<=.8?{t:'Atenção',c:'warn'}:p<=1?{t:'Cuidado!',c:'danger'}:{t:'Estourou!',c:'danger'};}

function R(){
  const m=S.month,w=S.week;
  const totalIn=incMT(m);
  const totalOut=moV(m)+fixTot();
  const balance=totalIn-totalOut;
  const mv=moV(m),mb=wkTot()*4;

  document.getElementById('app').innerHTML=`
    <div class="hero">
      <div class="hero-label"><span class="dot"></span> Família Silva</div>
      <h1>Cada real<br><em>no controle.</em></h1>
      <p>${MONTHS[m]} 2026 — Registre, acompanhe e economize.</p>
    </div>
    <div class="saldo-strip">
      <div class="saldo-card animate-in delay-1">
        <div class="saldo-label">Entradas</div>
        <div class="saldo-value positive">${fmt(totalIn)}</div>
        <div class="saldo-sub">${MONTHS[m]}</div>
      </div>
      <div class="saldo-card animate-in delay-2">
        <div class="saldo-label">Saídas</div>
        <div class="saldo-value negative">${fmt(totalOut)}</div>
        <div class="saldo-sub">fixos + variáveis</div>
      </div>
      <div class="saldo-card animate-in delay-3">
        <div class="saldo-label">Saldo</div>
        <div class="saldo-value ${balance>=0?'positive':'negative'}">${balance>=0?'':'-'}${fmt(balance)}</div>
        <div class="progress-bar"><div class="progress-fill ${balance>=0?'green':'red'}" style="width:${totalIn>0?Math.min((totalOut/totalIn)*100,100):0}%"></div></div>
      </div>
    </div>
    <div class="tabs" style="padding-top:12px;">
      ${['registrar','envelopes','fixos','pendencias','historico'].map(t=>{
        const labels={registrar:'💰 Registrar',envelopes:'📊 Envelopes',fixos:'🏛️ Fixos',pendencias:'📌 Pendências',historico:'📋 Histórico'};
        return`<button class="tab ${S.tab===t?'active':''}" onclick="go('${t}')">${labels[t]}</button>`;
      }).join('')}
    </div>
    ${S.tab==='registrar'?rReg():''}
    ${S.tab==='envelopes'?rEnv():''}
    ${S.tab==='fixos'?rFix():''}
    ${S.tab==='pendencias'?rPend():''}
    ${S.tab==='historico'?rHis():''}
    <div class="bottom-spacer"></div>
    <div class="toast" id="toast"></div>
    ${S.modal?rModal():''}
  `;
}

function rReg(){
  const cs=cats(),cat=cs.find(c=>c.id===S.selCat)||cs[0];
  if(!cat)return'<div class="section"><div class="empty-state"><span class="big-icon">📊</span>Adicione categorias na aba Envelopes.</div></div>';
  const sp=catW(S.month,S.week,cat.id),rm=cat.weekBudget-sp,s=st(sp,cat.weekBudget);
  return`
    <div class="section">
      <div class="section-header">
        <div class="section-title">Registrar gasto</div>
        <select class="month-select" onchange="setM(Number(this.value))">${MONTHS.map((n,i)=>`<option value="${i}" ${i===S.month?'selected':''}>${n}</option>`).join('')}</select>
      </div>
      <div class="register-card">
        <div class="category-grid">
          ${cs.map(c=>`<button class="cat-btn ${S.selCat===c.id?'selected':''}" onclick="selC('${c.id}')"><span class="cat-icon">${c.icon}</span>${c.name.length>10?c.name.substring(0,9)+'…':c.name}</button>`).join('')}
        </div>
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;">
          <span style="font-size:12px;color:var(--text-muted);">${cat.icon} ${cat.name}</span>
          <span class="status-badge ${s.c}">${s.t}</span>
        </div>
        <div style="font-size:12px;color:var(--text-muted);margin-bottom:12px;">
          Semana ${S.week}: ${fmt(sp)} de ${fmt(cat.weekBudget)} · Resta: <strong style="color:${rm>=0?'var(--green-mid)':'var(--red)'}">${fmt(rm)}</strong>
        </div>
        <div class="input-row"><div class="money-input"><span class="prefix">R$</span>
          <input type="number" inputmode="decimal" placeholder="0,00" id="valInput" value="${S.inputVal}" oninput="S.inputVal=this.value" onkeydown="if(event.key==='Enter')addExp()">
        </div></div>
        <input class="desc-input" type="text" placeholder="Descrição (opcional)" id="descInput" value="${S.inputDesc}" oninput="S.inputDesc=this.value">
        <input class="date-input" type="date" value="${S.inputDate}" oninput="S.inputDate=this.value">
        <div style="display:flex;gap:8px;margin-bottom:12px;">
          ${[1,2,3,4,5].map(w=>`<button class="week-btn ${S.week===w?'active':''}" onclick="setW(${w})" style="flex:1;padding:8px 0;font-size:12px;">S${w}</button>`).join('')}
        </div>
        <button class="btn-register" onclick="addExp()">Registrar gasto</button>
      </div>

      <div class="register-card" style="margin-top:12px;">
        <div style="font-size:14px;font-weight:500;margin-bottom:12px;">💰 Registrar entrada</div>
        <div class="input-row"><div class="money-input"><span class="prefix">R$</span>
          <input type="number" inputmode="decimal" placeholder="0,00" id="incVal" oninput="this.dataset.v=this.value" onkeydown="if(event.key==='Enter')addInc()">
        </div></div>
        <input class="desc-input" type="text" placeholder="Descrição (ex: Salário, Aluguel)" id="incDesc">
        <input class="date-input" type="date" value="${today()}" id="incDate">
        <button class="btn-register" onclick="addInc()" style="background:linear-gradient(135deg,#0B5E3D,#2CB67D);">Registrar entrada</button>
      </div>
    </div>`;
}

function rEnv(){
  const m=S.month,w=S.week,cs=cats(),isWeek=S.envView==='week';
  return`
    <div class="section">
      <div class="section-header">
        <div class="section-title">Envelopes</div>
        <select class="month-select" onchange="setM(Number(this.value))">${MONTHS.map((n,i)=>`<option value="${i}" ${i===m?'selected':''}>${n}</option>`).join('')}</select>
      </div>
      <div class="view-toggle">
        <button class="view-toggle-btn ${isWeek?'active':''}" onclick="S.envView='week';R();">Semanal</button>
        <button class="view-toggle-btn ${!isWeek?'active':''}" onclick="S.envView='month';R();">Mensal</button>
      </div>
      ${isWeek?`<div class="week-selector">${[1,2,3,4,5].map(k=>`<button class="week-btn ${w===k?'active':''}" onclick="setW(${k})">S${k}</button>`).join('')}</div>`:''}
      ${cs.map(cat=>{
        const sp=isWeek?catW(m,w,cat.id):catM(m,cat.id);
        const bg=isWeek?cat.weekBudget:cat.weekBudget*4;
        const pct=bg>0?Math.min((sp/bg)*100,100):0;
        const s=st(sp,bg);
        return`<div class="envelope-card">
          <span class="envelope-icon">${cat.icon}</span>
          <div class="envelope-info">
            <div style="display:flex;justify-content:space-between;align-items:center;">
              <span class="envelope-name">${cat.name}</span>
              <span class="status-badge ${s.c}">${s.t}</span>
            </div>
            <div class="envelope-bar"><div class="progress-fill ${pc(sp,bg)}" style="width:${pct}%"></div></div>
          </div>
          <div class="envelope-amounts">
            <div class="envelope-spent" style="color:var(--${pc(sp,bg)==='green'?'green-mid':pc(sp,bg)==='amber'?'amber':'red'})">${fmt(sp)}</div>
            <div class="envelope-budget">de ${fmt(bg)}</div>
          </div>
          <div class="edit-icon" onclick="editCat('${cat.id}')">✏️</div>
        </div>`;
      }).join('')}
      <button class="add-btn" onclick="addCat()">＋ Adicionar categoria</button>
      <div class="summary-footer" style="margin-top:16px;">
        ${isWeek?`<div class="summary-row"><span class="summary-label">Total semana ${w}</span><span class="summary-val">${fmt(wkS(m,w))}</span></div>
        <div class="summary-row"><span class="summary-label">Envelope semanal</span><span class="summary-val" style="color:var(--text-muted)">${fmt(wkTot())}</span></div>`:''}
        <div class="summary-row ${isWeek?'total':''}"><span class="summary-label" style="font-weight:600;">Total variável ${isWeek?'do mês':'de '+MONTHS[m]}</span><span class="summary-val" style="color:var(--${pc(moV(m),wkTot()*4)==='green'?'green-mid':'red'})">${fmt(moV(m))}</span></div>
        <div class="summary-row"><span class="summary-label">Orçamento mensal variável</span><span class="summary-val" style="color:var(--text-muted)">${fmt(wkTot()*4)}</span></div>
      </div>
    </div>`;
}

function rFix(){
  const m=S.month,fx=fixed().slice().sort((a,b)=>a.dueDay-b.dueDay);
  const pc2=fx.filter(f=>D.fixedPaid[`${m}-${f.id}`]).length;
  const pt=fx.filter(f=>D.fixedPaid[`${m}-${f.id}`]).reduce((a,b)=>a+b.val,0);
  const ft=fixTot(),inc=D.income;
  return`
    <div class="section">
      <div class="section-header">
        <div class="section-title">Despesas fixas</div>
        <select class="month-select" onchange="setM(Number(this.value))">${MONTHS.map((n,i)=>`<option value="${i}" ${i===m?'selected':''}>${n}</option>`).join('')}</select>
      </div>
      <div style="background:var(--card);border-radius:var(--radius);padding:16px;box-shadow:var(--shadow-sm);">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;">
          <span style="font-size:13px;color:var(--text-muted);">${pc2} de ${fx.length} pagos</span>
          <span style="font-size:13px;font-weight:600;color:var(--green-mid);">${fmt(pt)} pago</span>
        </div>
        <div class="progress-bar" style="margin-bottom:16px;"><div class="progress-fill green" style="width:${fx.length?(pc2/fx.length)*100:0}%"></div></div>
        ${fx.map(f=>{
          const paid=!!D.fixedPaid[`${m}-${f.id}`];
          return`<div class="fixed-item">
            <div class="fixed-check ${paid?'checked':''}" onclick="togFix('${f.id}')">${paid?'✓':''}</div>
            <div style="flex:1;cursor:pointer;" onclick="togFix('${f.id}')">
              <span class="fixed-name ${paid?'done':''}">${f.name}</span>
              ${f.dueDay?`<div class="fixed-due">vence dia ${f.dueDay}</div>`:''}
            </div>
            <span class="fixed-val">${fmt(f.val)}</span>
            <div class="edit-icon" onclick="editFix('${f.id}')">✏️</div>
          </div>`;
        }).join('')}
        <div class="summary-row total" style="margin-top:12px;"><span class="summary-label" style="font-weight:600;">Total fixo mensal</span><span class="summary-val">${fmt(ft)}</span></div>
      </div>
      <button class="add-btn" onclick="addFix()">＋ Adicionar despesa fixa</button>

      <div class="summary-footer" style="margin-top:16px;">
        <div class="summary-row"><span class="summary-label">Entradas do mês</span><span class="summary-val" style="color:var(--green-mid)">${fmt(incMT(m))}</span></div>
        <div class="summary-row"><span class="summary-label">Fixos</span><span class="summary-val">-${fmt(ft)}</span></div>
        <div class="summary-row"><span class="summary-label">Variáveis do mês</span><span class="summary-val">-${fmt(moV(m))}</span></div>
        <div class="summary-row total"><span class="summary-label" style="font-weight:600;">Resultado</span><span class="summary-val" style="color:var(--${(incMT(m)-ft-moV(m))>=0?'green-mid':'red'})">${fmt(incMT(m)-ft-moV(m))}</span></div>
      </div>
    </div>`;
}

function rPend(){
  const ps=D.pendencias;
  return`
    <div class="section">
      <div class="section-title">Pendências</div>
      <div style="background:var(--card);border-radius:var(--radius);padding:16px;box-shadow:var(--shadow-sm);">
        ${ps.length===0?`<div class="empty-state"><span class="big-icon">📌</span>Nenhuma pendência.<br>Adicione ações que precisam ser feitas!</div>`:''}
        ${ps.map((p,i)=>{
          return`<div class="pend-item">
            <div class="fixed-check ${p.done?'checked':''}" onclick="togPend(${i})">${p.done?'✓':''}</div>
            <span class="pend-text ${p.done?'done':''}" onclick="togPend(${i})">${p.text}</span>
            <div class="edit-icon" onclick="editPend(${i})">✏️</div>
            <div class="edit-icon" onclick="delPend(${i})" style="color:var(--red);border-color:var(--red-pale);">✕</div>
          </div>`;
        }).join('')}
      </div>
      <button class="add-btn" onclick="addPend()">＋ Adicionar pendência</button>
      ${ps.length>0?`<div style="font-size:12px;color:var(--text-muted);text-align:center;margin-top:12px;">${ps.filter(p=>p.done).length} de ${ps.length} concluídas</div>`:''}
    </div>`;
}

function rHis(){
  const m=S.month;
  const expenses=exM(m).slice().sort((a,b)=>{if(a.date&&b.date)return b.date.localeCompare(a.date);return(b.ts||0)-(a.ts||0);});
  const incomes=incM(m).slice().sort((a,b)=>b.date.localeCompare(a.date));
  const all=[...expenses.map(e=>({...e,_type:'out',_idx:D.expenses.indexOf(e)})),...incomes.map(i=>({...i,_type:'in',_idx:D.incomes.indexOf(i)}))];
  all.sort((a,b)=>{if(a.date&&b.date)return b.date.localeCompare(a.date);return(b.ts||0)-(a.ts||0);});

  return`
    <div class="section">
      <div class="section-header">
        <div class="section-title">Histórico de ${MONTHS[m]}</div>
        <select class="month-select" onchange="setM(Number(this.value))">${MONTHS.map((n,i)=>`<option value="${i}" ${i===m?'selected':''}>${n}</option>`).join('')}</select>
      </div>

      <div class="summary-footer" style="margin-bottom:12px;">
        <div class="summary-row"><span class="summary-label">Entradas</span><span class="summary-val" style="color:var(--green-mid)">${fmt(incMT(m))}</span></div>
        <div class="summary-row"><span class="summary-label">Saídas (variáveis)</span><span class="summary-val" style="color:var(--red)">${fmt(moV(m))}</span></div>
        <div class="summary-row"><span class="summary-label">Fixos</span><span class="summary-val">${fmt(fixTot())}</span></div>
        <div class="summary-row total"><span class="summary-label" style="font-weight:600;">Balanço</span><span class="summary-val" style="color:var(--${(incMT(m)-moV(m)-fixTot())>=0?'green-mid':'red'})">${fmt(incMT(m)-moV(m)-fixTot())}</span></div>
      </div>

      <div style="background:var(--card);border-radius:var(--radius);padding:16px;box-shadow:var(--shadow-sm);">
        ${all.length===0?`<div class="empty-state"><span class="big-icon">📝</span>Nenhum registro em ${MONTHS[m]}.</div>`:all.map(e=>{
          if(e._type==='out'){
            const cat=cats().find(c=>c.id===e.cat)||{icon:'📦',name:'Outro'};
            return`<div class="history-item">
              <div class="history-icon">${cat.icon}</div>
              <div class="history-info">
                <div class="history-desc">${e.desc||cat.name}</div>
                <div class="history-meta">${cat.name}${e.date?' · '+fmtDate(e.date):''}</div>
              </div>
              <div class="history-value out">-${fmt(e.val)}</div>
              <div class="edit-icon" onclick="editExp(${e._idx})">✏️</div>
              <div class="edit-icon" onclick="delExp(${e._idx})" style="color:var(--red);border-color:var(--red-pale);">✕</div>
            </div>`;
          } else {
            return`<div class="history-item">
              <div class="history-icon">💰</div>
              <div class="history-info">
                <div class="history-desc">${e.desc||'Entrada'}</div>
                <div class="history-meta">${e.date?fmtDate(e.date):''}</div>
              </div>
              <div class="history-value in">+${fmt(e.val)}</div>
              <div class="edit-icon" onclick="editIncome(${e._idx})">✏️</div>
              <div class="edit-icon" onclick="delIncome(${e._idx})" style="color:var(--red);border-color:var(--red-pale);">✕</div>
            </div>`;
          }
        }).join('')}
      </div>
      ${all.length>0?`<div style="text-align:center;margin-top:16px;"><button onclick="clrMo()" style="padding:10px 20px;border-radius:100px;border:1.5px solid var(--red);background:none;color:var(--red);font-family:'DM Sans',sans-serif;font-size:12px;font-weight:500;cursor:pointer;">Limpar mês</button></div>`:''}
    </div>`;
}

function rModal(){
  const mo=S.modal;if(!mo)return'';
  let b='';
  if(mo.type==='editCat'||mo.type==='addCat'){
    const isE=mo.type==='editCat';
    b=`<div class="modal-handle"></div><div class="modal-title">${isE?'Editar categoria':'Nova categoria'}</div>
      <label class="form-label">Ícone</label>
      <div class="emoji-picker">${EMOJIS.map(e=>`<button class="emoji-opt ${mo.icon===e?'sel':''}" onclick="S.modal.icon='${e}';R();">${e}</button>`).join('')}</div>
      <label class="form-label">Nome</label>
      <input class="form-input" type="text" value="${mo.name||''}" oninput="S.modal.name=this.value" placeholder="Ex: Mercado">
      <label class="form-label">Orçamento semanal (R$)</label>
      <input class="form-input" type="number" inputmode="decimal" value="${mo.budget||''}" oninput="S.modal.budget=this.value" placeholder="0">
      <button class="btn-save" onclick="saveCat()">${isE?'Salvar':'Adicionar'}</button>
      ${isE?'<button class="btn-danger-outline" onclick="delCat()">Excluir</button>':''}
      <button class="btn-outline" onclick="clModal()">Cancelar</button>`;
  }
  if(mo.type==='editFixed'||mo.type==='addFixed'){
    const isE=mo.type==='editFixed';
    b=`<div class="modal-handle"></div><div class="modal-title">${isE?'Editar despesa fixa':'Nova despesa fixa'}</div>
      <label class="form-label">Nome</label>
      <input class="form-input" type="text" value="${mo.name||''}" oninput="S.modal.name=this.value" placeholder="Ex: Condomínio">
      <label class="form-label">Valor mensal (R$)</label>
      <input class="form-input" type="number" inputmode="decimal" value="${mo.val||''}" oninput="S.modal.val=this.value" placeholder="0">
      <label class="form-label">Dia de vencimento</label>
      <input class="form-input" type="number" inputmode="numeric" value="${mo.dueDay||''}" oninput="S.modal.dueDay=this.value" placeholder="Ex: 15" min="1" max="31">
      <button class="btn-save" onclick="saveFixM()">${isE?'Salvar':'Adicionar'}</button>
      ${isE?'<button class="btn-danger-outline" onclick="delFixM()">Excluir</button>':''}
      <button class="btn-outline" onclick="clModal()">Cancelar</button>`;
  }
  if(mo.type==='editIncome'){
    b=`<div class="modal-handle"></div><div class="modal-title">Editar renda base</div>
      <label class="form-label">Renda mensal base (R$)</label>
      <input class="form-input" type="number" inputmode="decimal" value="${mo.val||''}" oninput="S.modal.val=this.value">
      <button class="btn-save" onclick="saveInc()">Salvar</button>
      <button class="btn-outline" onclick="clModal()">Cancelar</button>`;
  }
  if(mo.type==='editExp'){
    b=`<div class="modal-handle"></div><div class="modal-title">Editar gasto</div>
      <label class="form-label">Valor (R$)</label>
      <input class="form-input" type="number" inputmode="decimal" value="${mo.val||''}" oninput="S.modal.val=this.value">
      <label class="form-label">Descrição</label>
      <input class="form-input" type="text" value="${mo.desc||''}" oninput="S.modal.desc=this.value">
      <label class="form-label">Data</label>
      <input class="form-input" type="date" value="${mo.date||''}" oninput="S.modal.date=this.value">
      <button class="btn-save" onclick="saveExp()">Salvar</button>
      <button class="btn-outline" onclick="clModal()">Cancelar</button>`;
  }
  if(mo.type==='editIncEntry'){
    b=`<div class="modal-handle"></div><div class="modal-title">Editar entrada</div>
      <label class="form-label">Valor (R$)</label>
      <input class="form-input" type="number" inputmode="decimal" value="${mo.val||''}" oninput="S.modal.val=this.value">
      <label class="form-label">Descrição</label>
      <input class="form-input" type="text" value="${mo.desc||''}" oninput="S.modal.desc=this.value">
      <label class="form-label">Data</label>
      <input class="form-input" type="date" value="${mo.date||''}" oninput="S.modal.date=this.value">
      <button class="btn-save" onclick="saveIncEntry()">Salvar</button>
      <button class="btn-outline" onclick="clModal()">Cancelar</button>`;
  }
  if(mo.type==='addPend'||mo.type==='editPend'){
    const isE=mo.type==='editPend';
    b=`<div class="modal-handle"></div><div class="modal-title">${isE?'Editar pendência':'Nova pendência'}</div>
      <label class="form-label">Descrição</label>
      <textarea class="form-input" style="min-height:80px;resize:vertical;" oninput="S.modal.text=this.value" placeholder="O que precisa ser feito?">${mo.text||''}</textarea>
      <button class="btn-save" onclick="savePend()">${isE?'Salvar':'Adicionar'}</button>
      ${isE?'<button class="btn-danger-outline" onclick="delPendM()">Excluir</button>':''}
      <button class="btn-outline" onclick="clModal()">Cancelar</button>`;
  }
  return`<div class="modal-overlay" onclick="if(event.target===this)clModal()"><div class="modal-sheet">${b}</div></div>`;
}

// ACTIONS
function go(t){S.tab=t;R();}
function setW(w){S.week=w;R();}
function setM(m){S.month=m;R();}
function selC(id){S.selCat=id;R();}
function clModal(){S.modal=null;R();}

function addExp(){
  const v=parseFloat(S.inputVal);if(!v||v<=0){toast('Digite um valor');return;}
  const date=S.inputDate||today();
  D.expenses.push({cat:S.selCat,val:v,desc:S.inputDesc||'',date:date,month:dateMonth(date),week:dateWeek(date),ts:Date.now()});
  save();const c=cats().find(x=>x.id===S.selCat);toast(`${c?.icon||'✅'} ${fmt(v)} registrado!`);
  S.inputVal='';S.inputDesc='';R();
}
function addInc(){
  const el=document.getElementById('incVal');
  const v=parseFloat(el?.value);if(!v||v<=0){toast('Digite um valor');return;}
  const desc=document.getElementById('incDesc')?.value||'';
  const date=document.getElementById('incDate')?.value||today();
  D.incomes.push({val:v,desc,date,ts:Date.now()});
  save();toast(`💰 +${fmt(v)} registrado!`);R();
}
function delExp(i){if(i<0||i>=D.expenses.length)return;D.expenses.splice(i,1);save();toast('Removido');R();}
function delIncome(i){if(i<0||i>=D.incomes.length)return;D.incomes.splice(i,1);save();toast('Removido');R();}
function editExp(i){const e=D.expenses[i];if(!e)return;S.modal={type:'editExp',idx:i,val:e.val,desc:e.desc,date:e.date||''};R();}
function saveExp(){const mo=S.modal;const v=parseFloat(mo.val)||0;D.expenses[mo.idx].val=v;D.expenses[mo.idx].desc=mo.desc||'';D.expenses[mo.idx].date=mo.date||'';if(mo.date){D.expenses[mo.idx].month=dateMonth(mo.date);D.expenses[mo.idx].week=dateWeek(mo.date);}save();clModal();toast('Gasto atualizado!');}
function editIncome(i){const e=D.incomes[i];if(!e)return;S.modal={type:'editIncEntry',idx:i,val:e.val,desc:e.desc,date:e.date||''};R();}
function saveIncEntry(){const mo=S.modal;D.incomes[mo.idx].val=parseFloat(mo.val)||0;D.incomes[mo.idx].desc=mo.desc||'';D.incomes[mo.idx].date=mo.date||'';save();clModal();toast('Entrada atualizada!');}
function togFix(id){const k=`${S.month}-${id}`;D.fixedPaid[k]=!D.fixedPaid[k];save();R();}
function clrMo(){if(!confirm(`Limpar tudo de ${MONTHS[S.month]}?`))return;D.expenses=D.expenses.filter(e=>{if(e.date)return dateMonth(e.date)!==S.month;return e.month!==S.month;});D.incomes=D.incomes.filter(i=>dateMonth(i.date)!==S.month);save();R();toast('Mês limpo!');}

function editCat(id){const c=cats().find(x=>x.id===id);if(!c)return;S.modal={type:'editCat',id,name:c.name,icon:c.icon,budget:c.weekBudget};R();}
function addCat(){S.modal={type:'addCat',name:'',icon:'📦',budget:''};R();}
function saveCat(){const mo=S.modal;if(!mo.name){toast('Preencha o nome');return;}const b=parseFloat(mo.budget)||0;if(mo.type==='editCat'){const c=D.categories.find(x=>x.id===mo.id);if(c){c.name=mo.name;c.icon=mo.icon;c.weekBudget=b;}}else{const id='cat_'+Date.now();D.categories.push({id,name:mo.name,icon:mo.icon,weekBudget:b});S.selCat=id;}save();clModal();toast('Salvo!');}
function delCat(){if(!confirm('Excluir?'))return;D.categories=D.categories.filter(c=>c.id!==S.modal.id);if(S.selCat===S.modal.id)S.selCat=D.categories[0]?.id||'';save();clModal();toast('Excluído');}

function editFix(id){const f=fixed().find(x=>x.id===id);if(!f)return;S.modal={type:'editFixed',id,name:f.name,val:f.val,dueDay:f.dueDay||''};R();}
function addFix(){S.modal={type:'addFixed',name:'',val:'',dueDay:''};R();}
function saveFixM(){const mo=S.modal;if(!mo.name){toast('Preencha o nome');return;}const v=parseFloat(mo.val)||0;const dd=parseInt(mo.dueDay)||1;if(mo.type==='editFixed'){const f=D.fixedExpenses.find(x=>x.id===mo.id);if(f){f.name=mo.name;f.val=v;f.dueDay=dd;}}else{D.fixedExpenses.push({id:'f_'+Date.now(),name:mo.name,val:v,dueDay:dd});}save();clModal();toast('Salvo!');}
function delFixM(){if(!confirm('Excluir?'))return;D.fixedExpenses=D.fixedExpenses.filter(x=>x.id!==S.modal.id);save();clModal();toast('Excluído');}

// Pendencias
function addPend(){S.modal={type:'addPend',text:''};R();}
function editPend(i){S.modal={type:'editPend',idx:i,text:D.pendencias[i].text};R();}
function savePend(){const mo=S.modal;if(!mo.text){toast('Preencha');return;}if(mo.type==='editPend'){D.pendencias[mo.idx].text=mo.text;}else{D.pendencias.push({text:mo.text,done:false});}save();clModal();toast('Salvo!');}
function togPend(i){D.pendencias[i].done=!D.pendencias[i].done;save();R();}
function delPend(i){D.pendencias.splice(i,1);save();toast('Removido');R();}
function delPendM(){if(!confirm('Excluir?'))return;D.pendencias.splice(S.modal.idx,1);save();clModal();toast('Excluído');}

function toast(msg){setTimeout(()=>{const t=document.getElementById('toast');if(t){t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2500);}},50);}

R();
</script>
</body>
