<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Controle Financeiro — Família Silva</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700&family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,500;0,9..144,700;1,9..144,400&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #F7F6F2;
    --card: #FFFFFF;
    --green-deep: #0B3D2E;
    --green-mid: #1A7D5A;
    --green-light: #2CB67D;
    --green-pale: #E8F5EE;
    --amber: #E8A817;
    --amber-pale: #FFF8E7;
    --red: #D94F4F;
    --red-pale: #FDECEC;
    --text-primary: #1A1A18;
    --text-secondary: #6B6B65;
    --text-muted: #A3A39B;
    --border: #E8E8E2;
    --shadow-sm: 0 1px 3px rgba(0,0,0,0.04), 0 1px 2px rgba(0,0,0,0.06);
    --shadow-md: 0 4px 16px rgba(0,0,0,0.06), 0 1px 4px rgba(0,0,0,0.04);
    --shadow-lg: 0 12px 40px rgba(0,0,0,0.08);
    --radius: 16px;
    --radius-sm: 10px;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  body {
    font-family: 'DM Sans', system-ui, sans-serif;
    background: var(--bg);
    color: var(--text-primary);
    min-height: 100dvh;
    overflow-x: hidden;
    -webkit-font-smoothing: antialiased;
  }
  .hero {
    background: linear-gradient(160deg, #0B3D2E 0%, #145A3F 50%, #1A7D5A 100%);
    padding: 48px 24px 36px;
    position: relative;
    overflow: hidden;
  }
  .hero::before {
    content: '';
    position: absolute;
    top: -60%; right: -30%;
    width: 300px; height: 300px;
    background: radial-gradient(circle, rgba(44,182,125,0.25) 0%, transparent 70%);
    border-radius: 50%;
  }
  .hero::after {
    content: '';
    position: absolute;
    bottom: -40%; left: -20%;
    width: 250px; height: 250px;
    background: radial-gradient(circle, rgba(232,168,23,0.15) 0%, transparent 70%);
    border-radius: 50%;
  }
  .hero-label {
    display: inline-flex; align-items: center; gap: 6px;
    background: rgba(255,255,255,0.12);
    backdrop-filter: blur(8px);
    padding: 6px 14px; border-radius: 100px;
    font-size: 12px; font-weight: 500;
    color: rgba(255,255,255,0.85);
    margin-bottom: 20px; letter-spacing: 0.02em;
  }
  .hero-label .dot { width: 6px; height: 6px; background: var(--green-light); border-radius: 50%; }
  .hero h1 {
    font-family: 'Fraunces', serif;
    font-size: 32px; font-weight: 500; color: #fff;
    line-height: 1.15; margin-bottom: 8px;
    position: relative; z-index: 1;
  }
  .hero h1 em { font-style: italic; color: var(--green-light); }
  .hero p { font-size: 14px; color: rgba(255,255,255,0.6); line-height: 1.5; position: relative; z-index: 1; }

  .saldo-strip {
    display: grid; grid-template-columns: 1fr 1fr; gap: 10px;
    padding: 0 16px; margin-top: -24px; position: relative; z-index: 2;
  }
  .saldo-card { background: var(--card); border-radius: var(--radius); padding: 16px; box-shadow: var(--shadow-md); }
  .saldo-label { font-size: 11px; color: var(--text-muted); font-weight: 500; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 4px; }
  .saldo-value { font-family: 'Fraunces', serif; font-size: 26px; font-weight: 500; line-height: 1.2; }
  .saldo-value.positive { color: var(--green-mid); }
  .saldo-value.negative { color: var(--red); }
  .saldo-value.neutral { color: var(--text-primary); }
  .saldo-sub { font-size: 11px; color: var(--text-muted); margin-top: 2px; }

  .progress-bar { height: 6px; background: var(--border); border-radius: 3px; overflow: hidden; margin-top: 10px; }
  .progress-fill { height: 100%; border-radius: 3px; transition: width 0.6s cubic-bezier(0.16, 1, 0.3, 1); }
  .progress-fill.green { background: var(--green-light); }
  .progress-fill.amber { background: var(--amber); }
  .progress-fill.red { background: var(--red); }

  .tabs { display: flex; gap: 4px; padding: 16px 16px 0; overflow-x: auto; scrollbar-width: none; }
  .tabs::-webkit-scrollbar { display: none; }
  .tab {
    flex-shrink: 0; padding: 10px 16px; border-radius: 100px; border: none;
    font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 500;
    cursor: pointer; transition: all 0.2s;
    background: var(--card); color: var(--text-secondary); box-shadow: var(--shadow-sm);
  }
  .tab.active { background: var(--green-deep); color: #fff; box-shadow: 0 4px 12px rgba(11,61,46,0.3); }

  .section { padding: 20px 16px; }
  .section-title {
    font-size: 13px; font-weight: 600; color: var(--text-muted);
    text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 12px;
    display: flex; align-items: center; gap: 8px;
  }
  .section-title::before { content: ''; width: 3px; height: 14px; background: var(--green-light); border-radius: 2px; }

  .register-card { background: var(--card); border-radius: var(--radius); padding: 20px; box-shadow: var(--shadow-md); margin-bottom: 12px; }
  .category-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-bottom: 16px; }
  .cat-btn {
    display: flex; flex-direction: column; align-items: center; gap: 4px;
    padding: 12px 4px; border-radius: var(--radius-sm);
    border: 2px solid var(--border); background: var(--bg);
    font-family: 'DM Sans', sans-serif; font-size: 10px; font-weight: 500;
    color: var(--text-secondary); cursor: pointer; transition: all 0.15s;
  }
  .cat-btn .cat-icon { font-size: 22px; }
  .cat-btn.selected { border-color: var(--green-mid); background: var(--green-pale); color: var(--green-deep); }

  .input-row { display: flex; gap: 8px; margin-bottom: 12px; }
  .money-input { flex: 1; position: relative; }
  .money-input .prefix { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); font-size: 14px; font-weight: 600; color: var(--text-muted); }
  .money-input input {
    width: 100%; padding: 14px 14px 14px 44px; border-radius: var(--radius-sm);
    border: 2px solid var(--border); font-family: 'DM Sans', sans-serif;
    font-size: 20px; font-weight: 600; color: var(--text-primary);
    background: var(--bg); outline: none; transition: border-color 0.15s;
  }
  .money-input input:focus { border-color: var(--green-mid); }
  .money-input input::placeholder { color: var(--text-muted); font-weight: 400; font-size: 16px; }
  .desc-input {
    width: 100%; padding: 12px 14px; border-radius: var(--radius-sm);
    border: 1.5px solid var(--border); font-family: 'DM Sans', sans-serif;
    font-size: 14px; color: var(--text-primary); background: var(--bg);
    outline: none; transition: border-color 0.15s; margin-bottom: 12px;
  }
  .desc-input:focus { border-color: var(--green-mid); }
  .btn-register {
    width: 100%; padding: 16px; border-radius: var(--radius-sm); border: none;
    background: linear-gradient(135deg, var(--green-deep), var(--green-mid));
    color: #fff; font-family: 'DM Sans', sans-serif; font-size: 15px; font-weight: 600;
    cursor: pointer; box-shadow: 0 4px 16px rgba(11,61,46,0.3); transition: all 0.15s;
  }
  .btn-register:active { transform: scale(0.98); }

  .envelope-card {
    background: var(--card); border-radius: var(--radius); padding: 14px 16px;
    box-shadow: var(--shadow-sm); margin-bottom: 8px;
    display: flex; align-items: center; gap: 12px;
  }
  .envelope-icon { font-size: 28px; flex-shrink: 0; }
  .envelope-info { flex: 1; min-width: 0; }
  .envelope-name { font-size: 14px; font-weight: 500; }
  .envelope-bar { height: 5px; background: var(--border); border-radius: 3px; margin-top: 6px; overflow: hidden; }
  .envelope-amounts { text-align: right; flex-shrink: 0; }
  .envelope-spent { font-family: 'Fraunces', serif; font-size: 16px; font-weight: 500; }
  .envelope-budget { font-size: 11px; color: var(--text-muted); }

  .status-badge {
    display: inline-flex; align-items: center; gap: 4px;
    padding: 3px 8px; border-radius: 100px;
    font-size: 10px; font-weight: 600; letter-spacing: 0.03em;
  }
  .status-badge.ok { background: var(--green-pale); color: var(--green-mid); }
  .status-badge.warn { background: var(--amber-pale); color: #946800; }
  .status-badge.danger { background: var(--red-pale); color: var(--red); }

  .history-item { display: flex; align-items: center; gap: 12px; padding: 12px 0; border-bottom: 1px solid var(--border); }
  .history-item:last-child { border-bottom: none; }
  .history-icon { width: 38px; height: 38px; border-radius: 10px; background: var(--bg); display: flex; align-items: center; justify-content: center; font-size: 18px; flex-shrink: 0; }
  .history-info { flex: 1; min-width: 0; }
  .history-desc { font-size: 13px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .history-meta { font-size: 11px; color: var(--text-muted); }
  .history-value { font-family: 'Fraunces', serif; font-size: 15px; font-weight: 500; color: var(--red); flex-shrink: 0; }

  .fixed-item { display: flex; align-items: center; gap: 12px; padding: 12px 0; border-bottom: 1px solid var(--border); }
  .fixed-check {
    width: 24px; height: 24px; border-radius: 7px;
    border: 2px solid var(--border); display: flex; align-items: center; justify-content: center;
    flex-shrink: 0; transition: all 0.15s; font-size: 13px; color: #fff; cursor: pointer;
  }
  .fixed-check.checked { background: var(--green-light); border-color: var(--green-light); }
  .fixed-name { flex: 1; font-size: 14px; cursor: pointer; }
  .fixed-name.done { text-decoration: line-through; opacity: 0.5; }
  .fixed-val { font-family: 'Fraunces', serif; font-size: 14px; font-weight: 500; }

  .week-selector { display: flex; gap: 6px; margin-bottom: 16px; }
  .week-btn {
    flex: 1; padding: 10px 0; border-radius: var(--radius-sm);
    border: 2px solid var(--border); background: var(--card);
    font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 600;
    color: var(--text-secondary); cursor: pointer; transition: all 0.15s; text-align: center;
  }
  .week-btn.active { border-color: var(--green-mid); background: var(--green-pale); color: var(--green-deep); }

  .toast {
    position: fixed; bottom: 30px; left: 50%;
    transform: translateX(-50%) translateY(100px);
    background: var(--green-deep); color: #fff; padding: 14px 24px;
    border-radius: 100px; font-size: 14px; font-weight: 500;
    box-shadow: var(--shadow-lg); z-index: 100;
    transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1); white-space: nowrap;
  }
  .toast.show { transform: translateX(-50%) translateY(0); }

  @keyframes fadeUp { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
  .animate-in { animation: fadeUp 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
  .delay-1 { animation-delay: 0.05s; opacity: 0; }
  .delay-2 { animation-delay: 0.1s; opacity: 0; }
  .delay-3 { animation-delay: 0.15s; opacity: 0; }

  .month-select {
    padding: 8px 12px; border-radius: 8px; border: 1.5px solid var(--border);
    font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 500;
    color: var(--text-primary); background: var(--card); outline: none;
  }
  .section-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }

  .summary-footer { background: var(--card); border-radius: var(--radius); padding: 16px 20px; box-shadow: var(--shadow-sm); margin-top: 8px; }
  .summary-row { display: flex; justify-content: space-between; align-items: center; padding: 6px 0; }
  .summary-row.total { border-top: 2px solid var(--border); margin-top: 6px; padding-top: 12px; }
  .summary-label { font-size: 13px; color: var(--text-secondary); }
  .summary-val { font-family: 'Fraunces', serif; font-size: 16px; font-weight: 500; }

  .empty-state { text-align: center; padding: 32px 16px; color: var(--text-muted); font-size: 13px; }
  .empty-state .big-icon { font-size: 40px; margin-bottom: 8px; display: block; }
  .bottom-spacer { height: 40px; }

  /* MODAL */
  .modal-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0.45); z-index: 50;
    display: flex; align-items: flex-end; justify-content: center;
    animation: fadeIn 0.2s;
  }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  .modal-sheet {
    background: var(--card); border-radius: 20px 20px 0 0;
    width: 100%; max-width: 640px; max-height: 85dvh;
    overflow-y: auto; padding: 24px 20px 32px;
    animation: slideUp 0.3s cubic-bezier(0.16, 1, 0.3, 1);
  }
  @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
  .modal-handle { width: 36px; height: 4px; background: var(--border); border-radius: 2px; margin: 0 auto 16px; }
  .modal-title { font-size: 18px; font-weight: 600; margin-bottom: 16px; }
  .form-label { font-size: 12px; font-weight: 600; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 6px; display: block; }
  .form-input {
    width: 100%; padding: 12px 14px; border-radius: var(--radius-sm);
    border: 1.5px solid var(--border); font-family: 'DM Sans', sans-serif;
    font-size: 14px; color: var(--text-primary); background: var(--bg);
    outline: none; margin-bottom: 14px;
  }
  .form-input:focus { border-color: var(--green-mid); }
  .emoji-picker { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 14px; }
  .emoji-opt {
    width: 42px; height: 42px; border-radius: 10px;
    border: 2px solid var(--border); background: var(--bg);
    font-size: 20px; display: flex; align-items: center; justify-content: center;
    cursor: pointer; transition: all 0.15s;
  }
  .emoji-opt.sel { border-color: var(--green-mid); background: var(--green-pale); }
  .btn-save {
    width: 100%; padding: 14px; border-radius: var(--radius-sm); border: none;
    background: linear-gradient(135deg, var(--green-deep), var(--green-mid));
    color: #fff; font-family: 'DM Sans', sans-serif; font-size: 15px; font-weight: 600;
    cursor: pointer; margin-top: 4px;
  }
  .btn-outline {
    width: 100%; padding: 12px; border-radius: var(--radius-sm);
    border: 1.5px solid var(--border); background: none;
    color: var(--text-secondary); font-family: 'DM Sans', sans-serif;
    font-size: 13px; font-weight: 500; cursor: pointer; margin-top: 8px;
  }
  .btn-danger-outline {
    width: 100%; padding: 12px; border-radius: var(--radius-sm);
    border: 1.5px solid var(--red); background: none;
    color: var(--red); font-family: 'DM Sans', sans-serif;
    font-size: 13px; font-weight: 500; cursor: pointer; margin-top: 8px;
  }
  .edit-icon {
    width: 28px; height: 28px; border-radius: 7px;
    border: 1.5px solid var(--border); background: var(--bg);
    display: flex; align-items: center; justify-content: center;
    font-size: 13px; cursor: pointer; flex-shrink: 0;
    transition: all 0.15s; color: var(--text-muted);
  }
  .edit-icon:active { background: var(--border); }
  .add-btn {
    display: flex; align-items: center; justify-content: center; gap: 6px;
    width: 100%; padding: 14px; border-radius: var(--radius);
    border: 2px dashed var(--border); background: none;
    font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 500;
    color: var(--text-muted); cursor: pointer; transition: all 0.15s; margin-top: 8px;
  }
  .add-btn:active { background: var(--bg); border-color: var(--green-mid); color: var(--green-mid); }
  .income-edit {
    display: flex; gap: 8px; align-items: center;
    padding: 10px 14px; background: var(--green-pale);
    border-radius: var(--radius-sm); margin-bottom: 12px; cursor: pointer;
  }
  .income-edit:active { opacity: 0.8; }
</style>
</head>
<body>
<div id="app"></div>
<script>
const SK = 'familia-silva-fin-v5';
const MONTHS = ['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];
const EMOJIS = ['🛒','⛽','💊','👶','🍽️','🏠','🎵','📦','🚗','💰','🏥','🎓','👕','🐾','🍺','☕','📱','✂️','🧹','🔧','💡','🎁','🏋️','💅'];

const DEF_CATS = [
  {id:'mercado',name:'Mercado',icon:'🛒',weekBudget:550},
  {id:'gasolina',name:'Gasolina',icon:'⛽',weekBudget:350},
  {id:'farmacia',name:'Farmácia',icon:'💊',weekBudget:75},
  {id:'fraldas',name:'Fraldas/Bebê',icon:'👶',weekBudget:150},
  {id:'alimentacao',name:'Alimentação',icon:'🍽️',weekBudget:100},
  {id:'limpeza',name:'Limpeza',icon:'🏠',weekBudget:600},
  {id:'musica',name:'Aula música',icon:'🎵',weekBudget:100},
  {id:'imprevistos',name:'Imprevistos',icon:'📦',weekBudget:50},
];
const DEF_FIXED = [
  {id:'f0',name:'Colégio Avelie',val:2100},{id:'f1',name:'Condomínio',val:1050},
  {id:'f2',name:'IPTU (Paineiras + Sucupira)',val:870},{id:'f3',name:'Luz (casa + edícola)',val:362},
  {id:'f4',name:'Água',val:33},{id:'f5',name:'Internet Vivo',val:396},
  {id:'f6',name:'Starlink',val:236},{id:'f7',name:'Elias (jardinagem)',val:1200},
  {id:'f8',name:'Seguros carro',val:1068},{id:'f9',name:'Dízimo',val:1200},
  {id:'f10',name:'Doações',val:900},{id:'f11',name:'Thiago (tênis)',val:400},
  {id:'f12',name:'Quartel / Felipe Vilhena',val:150},{id:'f13',name:'Assinaturas digitais',val:784},
];

function load(){
  try{const r=localStorage.getItem(SK);if(r){const d=JSON.parse(r);if(!d.categories)d.categories=JSON.parse(JSON.stringify(DEF_CATS));if(!d.fixedExpenses)d.fixedExpenses=JSON.parse(JSON.stringify(DEF_FIXED));if(!d.income)d.income=16500;if(!d.expenses)d.expenses=[];if(!d.fixedPaid)d.fixedPaid={};return d;}}catch(e){}
  return{categories:JSON.parse(JSON.stringify(DEF_CATS)),fixedExpenses:JSON.parse(JSON.stringify(DEF_FIXED)),income:16500,expenses:[],fixedPaid:{}};
}
function save(){try{localStorage.setItem(SK,JSON.stringify(D));}catch(e){}}

const fmt=v=>'R$ '+Math.abs(Math.round(v)).toLocaleString('pt-BR');
let D=load();
let S={tab:'registrar',month:new Date().getMonth(),week:Math.min(Math.ceil(new Date().getDate()/7),5),selCat:D.categories[0]?.id||'',inputVal:'',inputDesc:'',modal:null};

function cats(){return D.categories;}
function fixed(){return D.fixedExpenses;}
function fixTot(){return fixed().reduce((a,b)=>a+b.val,0);}
function wkTot(){return cats().reduce((a,b)=>a+b.weekBudget,0);}
function exM(m){return D.expenses.filter(e=>e.month===m);}
function exW(m,w){return D.expenses.filter(e=>e.month===m&&e.week===w);}
function catW(m,w,c){return exW(m,w).filter(e=>e.cat===c).reduce((a,b)=>a+b.val,0);}
function catM(m,c){return exM(m).filter(e=>e.cat===c).reduce((a,b)=>a+b.val,0);}
function wkS(m,w){return exW(m,w).reduce((a,b)=>a+b.val,0);}
function moV(m){return exM(m).reduce((a,b)=>a+b.val,0);}
function pc(s,b){if(!b)return'green';const p=s/b;return p<=0.5?'green':p<=0.8?'amber':'red';}
function st(s,b){if(!b)return{t:'—',c:'ok'};const p=s/b;return p<=0.5?{t:'Tranquilo',c:'ok'}:p<=0.8?{t:'Atenção',c:'warn'}:p<=1?{t:'Cuidado!',c:'danger'}:{t:'Estourou!',c:'danger'};}

function R(){
  const m=S.month,w=S.week,ws=wkS(m,w),wb=wkTot(),wr=wb-ws,mv=moV(m),mb=wkTot()*4;
  const wp=wb>0?Math.min((ws/wb)*100,100):0;
  document.getElementById('app').innerHTML=`
    <div class="hero">
      <div class="hero-label"><span class="dot"></span> Família Silva</div>
      <h1>Cada real<br><em>no controle.</em></h1>
      <p>Registre, acompanhe e economize — semana a semana.</p>
    </div>
    <div class="saldo-strip">
      <div class="saldo-card animate-in delay-1">
        <div class="saldo-label">Sobra da semana</div>
        <div class="saldo-value ${wr>=0?'positive':'negative'}">${fmt(wr)}</div>
        <div class="saldo-sub">Semana ${w} · ${MONTHS[m]}</div>
        <div class="progress-bar"><div class="progress-fill ${pc(ws,wb)}" style="width:${wp}%"></div></div>
      </div>
      <div class="saldo-card animate-in delay-2">
        <div class="saldo-label">Variável do mês</div>
        <div class="saldo-value ${pc(mv,mb)==='green'?'positive':pc(mv,mb)==='red'?'negative':'neutral'}">${fmt(mv)}</div>
        <div class="saldo-sub">de ${fmt(mb)}</div>
        <div class="progress-bar"><div class="progress-fill ${pc(mv,mb)}" style="width:${Math.min((mv/mb)*100,100)}%"></div></div>
      </div>
    </div>
    <div class="tabs animate-in delay-3">
      <button class="tab ${S.tab==='registrar'?'active':''}" onclick="go('registrar')">💰 Registrar</button>
      <button class="tab ${S.tab==='envelopes'?'active':''}" onclick="go('envelopes')">📊 Envelopes</button>
      <button class="tab ${S.tab==='fixos'?'active':''}" onclick="go('fixos')">🏛️ Fixos</button>
      <button class="tab ${S.tab==='historico'?'active':''}" onclick="go('historico')">📋 Histórico</button>
    </div>
    ${S.tab==='registrar'?rReg():''}
    ${S.tab==='envelopes'?rEnv():''}
    ${S.tab==='fixos'?rFix():''}
    ${S.tab==='historico'?rHis():''}
    <div class="bottom-spacer"></div>
    <div class="toast" id="toast"></div>
    ${S.modal?rModal():''}
  `;
}

function rReg(){
  const cs=cats(),cat=cs.find(c=>c.id===S.selCat)||cs[0];
  if(!cat)return'<div class="section"><div class="empty-state"><span class="big-icon">📊</span>Adicione categorias na aba Envelopes.</div></div>';
  const sp=catW(S.month,S.week,cat.id),rm=cat.weekBudget-sp,s=st(sp,cat.weekBudget);
  return`
    <div class="section">
      <div class="section-header">
        <div class="section-title">Registrar gasto</div>
        <div style="display:flex;gap:4px;">${[1,2,3,4,5].map(w=>`<button class="week-btn ${S.week===w?'active':''}" onclick="setW(${w})" style="width:42px;padding:8px 0;font-size:12px;">S${w}</button>`).join('')}</div>
      </div>
      <div class="register-card">
        <div class="category-grid">
          ${cs.map(c=>`<button class="cat-btn ${S.selCat===c.id?'selected':''}" onclick="selC('${c.id}')"><span class="cat-icon">${c.icon}</span>${c.name.length>10?c.name.substring(0,9)+'…':c.name}</button>`).join('')}
        </div>
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;">
          <span style="font-size:12px;color:var(--text-muted);">${cat.icon} ${cat.name} · semana ${S.week}</span>
          <span class="status-badge ${s.c}">${s.t}</span>
        </div>
        <div style="font-size:12px;color:var(--text-muted);margin-bottom:12px;">
          Gasto: ${fmt(sp)} de ${fmt(cat.weekBudget)} · Resta: <strong style="color:${rm>=0?'var(--green-mid)':'var(--red)'}">${fmt(rm)}</strong>
        </div>
        <div class="input-row"><div class="money-input"><span class="prefix">R$</span>
          <input type="number" inputmode="decimal" placeholder="0,00" id="valInput" value="${S.inputVal}" oninput="S.inputVal=this.value" onkeydown="if(event.key==='Enter')addExp()">
        </div></div>
        <input class="desc-input" type="text" placeholder="Descrição (opcional)" id="descInput" value="${S.inputDesc}" oninput="S.inputDesc=this.value" onkeydown="if(event.key==='Enter')addExp()">
        <button class="btn-register" onclick="addExp()">Registrar gasto</button>
      </div>
    </div>`;
}

function rEnv(){
  const m=S.month,w=S.week,cs=cats();
  return`
    <div class="section">
      <div class="section-header">
        <div class="section-title">Envelopes da semana</div>
        <select class="month-select" onchange="setM(Number(this.value))">${MONTHS.map((n,i)=>`<option value="${i}" ${i===m?'selected':''}>${n}</option>`).join('')}</select>
      </div>
      <div class="week-selector">${[1,2,3,4,5].map(k=>`<button class="week-btn ${w===k?'active':''}" onclick="setW(${k})">S${k}</button>`).join('')}</div>
      ${cs.map(cat=>{
        const sp=catW(m,w,cat.id),bg=cat.weekBudget,pct=bg>0?Math.min((sp/bg)*100,100):0,s=st(sp,bg);
        return`<div class="envelope-card">
          <span class="envelope-icon">${cat.icon}</span>
          <div class="envelope-info">
            <div style="display:flex;justify-content:space-between;align-items:center;">
              <span class="envelope-name">${cat.name}</span>
              <span class="status-badge ${s.c}">${s.t}</span>
            </div>
            <div class="envelope-bar"><div class="progress-fill ${pc(sp,bg)}" style="width:${pct}%"></div></div>
          </div>
          <div class="envelope-amounts">
            <div class="envelope-spent" style="color:var(--${pc(sp,bg)==='green'?'green-mid':pc(sp,bg)==='amber'?'amber':'red'})">${fmt(sp)}</div>
            <div class="envelope-budget">de ${fmt(bg)}</div>
          </div>
          <div class="edit-icon" onclick="editCat('${cat.id}')">✏️</div>
        </div>`;
      }).join('')}
      <button class="add-btn" onclick="addCat()">＋ Adicionar categoria</button>
      <div class="summary-footer" style="margin-top:16px;">
        <div class="summary-row"><span class="summary-label">Total semana ${w}</span><span class="summary-val">${fmt(wkS(m,w))}</span></div>
        <div class="summary-row"><span class="summary-label">Envelope semanal</span><span class="summary-val" style="color:var(--text-muted)">${fmt(wkTot())}</span></div>
        <div class="summary-row total"><span class="summary-label" style="font-weight:600;">Total variável do mês</span><span class="summary-val" style="color:var(--${pc(moV(m),wkTot()*4)==='green'?'green-mid':'red'})">${fmt(moV(m))}</span></div>
      </div>
    </div>`;
}

function rFix(){
  const m=S.month,fx=fixed(),pc2=fx.filter(f=>D.fixedPaid[`${m}-${f.id}`]).length;
  const pt=fx.filter(f=>D.fixedPaid[`${m}-${f.id}`]).reduce((a,b)=>a+b.val,0);
  const ft=fixTot(),inc=D.income;
  return`
    <div class="section">
      <div class="section-header">
        <div class="section-title">Despesas fixas</div>
        <select class="month-select" onchange="setM(Number(this.value))">${MONTHS.map((n,i)=>`<option value="${i}" ${i===m?'selected':''}>${n}</option>`).join('')}</select>
      </div>
      <div class="income-edit" onclick="editInc()">
        <span style="font-size:18px;">💰</span>
        <div style="flex:1;"><div style="font-size:11px;color:var(--green-deep);font-weight:500;">RENDA MENSAL</div>
        <div style="font-family:'Fraunces',serif;font-size:20px;font-weight:500;color:var(--green-deep);">${fmt(inc)}</div></div>
        <div class="edit-icon" style="border-color:var(--green-mid);">✏️</div>
      </div>
      <div style="background:var(--card);border-radius:var(--radius);padding:16px;box-shadow:var(--shadow-sm);">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;">
          <span style="font-size:13px;color:var(--text-muted);">${pc2} de ${fx.length} pagos</span>
          <span style="font-size:13px;font-weight:600;color:var(--green-mid);">${fmt(pt)} pago</span>
        </div>
        <div class="progress-bar" style="margin-bottom:16px;"><div class="progress-fill green" style="width:${fx.length?(pc2/fx.length)*100:0}%"></div></div>
        ${fx.map(f=>{
          const paid=!!D.fixedPaid[`${m}-${f.id}`];
          return`<div class="fixed-item">
            <div class="fixed-check ${paid?'checked':''}" onclick="togFix('${f.id}')">${paid?'✓':''}</div>
            <span class="fixed-name ${paid?'done':''}" onclick="togFix('${f.id}')">${f.name}</span>
            <span class="fixed-val">${fmt(f.val)}</span>
            <div class="edit-icon" onclick="editFix('${f.id}')">✏️</div>
          </div>`;
        }).join('')}
        <div class="summary-row total" style="margin-top:12px;"><span class="summary-label" style="font-weight:600;">Total fixo mensal</span><span class="summary-val">${fmt(ft)}</span></div>
      </div>
      <button class="add-btn" onclick="addFix()">＋ Adicionar despesa fixa</button>
      <div class="summary-footer" style="margin-top:16px;">
        <div class="summary-row"><span class="summary-label">Renda mensal</span><span class="summary-val" style="color:var(--green-mid)">${fmt(inc)}</span></div>
        <div class="summary-row"><span class="summary-label">Fixos</span><span class="summary-val">-${fmt(ft)}</span></div>
        <div class="summary-row"><span class="summary-label">Variáveis do mês</span><span class="summary-val">-${fmt(moV(m))}</span></div>
        <div class="summary-row total"><span class="summary-label" style="font-weight:600;">Resultado</span><span class="summary-val" style="color:var(--${(inc-ft-moV(m))>=0?'green-mid':'red'})">${fmt(inc-ft-moV(m))}</span></div>
      </div>
    </div>`;
}

function rHis(){
  const m=S.month,exps=exM(m).slice().reverse();
  return`
    <div class="section">
      <div class="section-header">
        <div class="section-title">Histórico de ${MONTHS[m]}</div>
        <select class="month-select" onchange="setM(Number(this.value))">${MONTHS.map((n,i)=>`<option value="${i}" ${i===m?'selected':''}>${n}</option>`).join('')}</select>
      </div>
      <div style="background:var(--card);border-radius:var(--radius);padding:16px;box-shadow:var(--shadow-sm);">
        ${exps.length===0?`<div class="empty-state"><span class="big-icon">📝</span>Nenhum gasto registrado em ${MONTHS[m]}.<br>Use a aba "Registrar" para começar!</div>`:exps.map(e=>{
          const cat=cats().find(c=>c.id===e.cat)||{icon:'📦',name:'Removido'};
          const idx=D.expenses.indexOf(e);
          return`<div class="history-item">
            <div class="history-icon">${cat.icon}</div>
            <div class="history-info"><div class="history-desc">${e.desc||cat.name}</div><div class="history-meta">${cat.name} · Semana ${e.week}</div></div>
            <div class="history-value">-${fmt(e.val)}</div>
            <div class="edit-icon" onclick="delExp(${idx})" style="color:var(--red);border-color:var(--red-pale);">✕</div>
          </div>`;
        }).join('')}
      </div>
      ${exps.length>0?`<div style="text-align:center;margin-top:16px;"><button onclick="clrMo()" style="padding:10px 20px;border-radius:100px;border:1.5px solid var(--red);background:none;color:var(--red);font-family:'DM Sans',sans-serif;font-size:12px;font-weight:500;cursor:pointer;">Limpar mês</button></div>`:''}
    </div>`;
}

// MODAL
function rModal(){
  const mo=S.modal;if(!mo)return'';
  let b='';
  if(mo.type==='editCat'||mo.type==='addCat'){
    const isE=mo.type==='editCat';
    b=`<div class="modal-handle"></div><div class="modal-title">${isE?'Editar categoria':'Nova categoria'}</div>
      <label class="form-label">Ícone</label>
      <div class="emoji-picker">${EMOJIS.map(e=>`<button class="emoji-opt ${mo.icon===e?'sel':''}" onclick="S.modal.icon='${e}';R();">${e}</button>`).join('')}</div>
      <label class="form-label">Nome da categoria</label>
      <input class="form-input" type="text" value="${mo.name||''}" oninput="S.modal.name=this.value" placeholder="Ex: Mercado">
      <label class="form-label">Orçamento semanal (R$)</label>
      <input class="form-input" type="number" inputmode="decimal" value="${mo.budget||''}" oninput="S.modal.budget=this.value" placeholder="0">
      <button class="btn-save" onclick="saveCat()">${isE?'Salvar alterações':'Adicionar categoria'}</button>
      ${isE?'<button class="btn-danger-outline" onclick="delCat()">Excluir categoria</button>':''}
      <button class="btn-outline" onclick="clModal()">Cancelar</button>`;
  }
  if(mo.type==='editFixed'||mo.type==='addFixed'){
    const isE=mo.type==='editFixed';
    b=`<div class="modal-handle"></div><div class="modal-title">${isE?'Editar despesa fixa':'Nova despesa fixa'}</div>
      <label class="form-label">Nome</label>
      <input class="form-input" type="text" value="${mo.name||''}" oninput="S.modal.name=this.value" placeholder="Ex: Condomínio">
      <label class="form-label">Valor mensal (R$)</label>
      <input class="form-input" type="number" inputmode="decimal" value="${mo.val||''}" oninput="S.modal.val=this.value" placeholder="0">
      <button class="btn-save" onclick="saveFixM()">${isE?'Salvar alterações':'Adicionar despesa fixa'}</button>
      ${isE?'<button class="btn-danger-outline" onclick="delFixM()">Excluir despesa</button>':''}
      <button class="btn-outline" onclick="clModal()">Cancelar</button>`;
  }
  if(mo.type==='editIncome'){
    b=`<div class="modal-handle"></div><div class="modal-title">Editar renda mensal</div>
      <label class="form-label">Renda mensal (R$)</label>
      <input class="form-input" type="number" inputmode="decimal" value="${mo.val||''}" oninput="S.modal.val=this.value" placeholder="0">
      <button class="btn-save" onclick="saveInc()">Salvar</button>
      <button class="btn-outline" onclick="clModal()">Cancelar</button>`;
  }
  return`<div class="modal-overlay" onclick="if(event.target===this)clModal()"><div class="modal-sheet">${b}</div></div>`;
}

// ACTIONS
function go(t){S.tab=t;R();}
function setW(w){S.week=w;R();}
function setM(m){S.month=m;R();}
function selC(id){S.selCat=id;R();}
function clModal(){S.modal=null;R();}

function addExp(){
  const v=parseFloat(S.inputVal);if(!v||v<=0){toast('Digite um valor válido');return;}
  D.expenses.push({cat:S.selCat,val:v,desc:S.inputDesc||'',month:S.month,week:S.week,ts:Date.now()});
  save();const c=cats().find(x=>x.id===S.selCat);toast(`${c?.icon||'✅'} ${fmt(v)} registrado!`);
  S.inputVal='';S.inputDesc='';R();
}
function delExp(i){if(i<0||i>=D.expenses.length)return;D.expenses.splice(i,1);save();toast('Gasto removido');R();}
function togFix(id){const k=`${S.month}-${id}`;D.fixedPaid[k]=!D.fixedPaid[k];save();R();}
function clrMo(){if(!confirm(`Limpar todos os gastos de ${MONTHS[S.month]}?`))return;D.expenses=D.expenses.filter(e=>e.month!==S.month);save();R();toast('Mês limpo!');}

// Cat modals
function editCat(id){const c=cats().find(x=>x.id===id);if(!c)return;S.modal={type:'editCat',id,name:c.name,icon:c.icon,budget:c.weekBudget};R();}
function addCat(){S.modal={type:'addCat',name:'',icon:'📦',budget:''};R();}
function saveCat(){
  const mo=S.modal;if(!mo.name){toast('Preencha o nome');return;}
  const b=parseFloat(mo.budget)||0;
  if(mo.type==='editCat'){const c=D.categories.find(x=>x.id===mo.id);if(c){c.name=mo.name;c.icon=mo.icon;c.weekBudget=b;}}
  else{const id='cat_'+Date.now();D.categories.push({id,name:mo.name,icon:mo.icon,weekBudget:b});S.selCat=id;}
  save();clModal();toast('Categoria salva!');
}
function delCat(){if(!confirm('Excluir esta categoria?'))return;D.categories=D.categories.filter(c=>c.id!==S.modal.id);if(S.selCat===S.modal.id)S.selCat=D.categories[0]?.id||'';save();clModal();toast('Categoria excluída');}

// Fixed modals
function editFix(id){const f=fixed().find(x=>x.id===id);if(!f)return;S.modal={type:'editFixed',id,name:f.name,val:f.val};R();}
function addFix(){S.modal={type:'addFixed',name:'',val:''};R();}
function saveFixM(){
  const mo=S.modal;if(!mo.name){toast('Preencha o nome');return;}
  const v=parseFloat(mo.val)||0;
  if(mo.type==='editFixed'){const f=D.fixedExpenses.find(x=>x.id===mo.id);if(f){f.name=mo.name;f.val=v;}}
  else{D.fixedExpenses.push({id:'f_'+Date.now(),name:mo.name,val:v});}
  save();clModal();toast('Despesa fixa salva!');
}
function delFixM(){if(!confirm('Excluir esta despesa fixa?'))return;D.fixedExpenses=D.fixedExpenses.filter(x=>x.id!==S.modal.id);save();clModal();toast('Despesa excluída');}

// Income
function editInc(){S.modal={type:'editIncome',val:D.income};R();}
function saveInc(){D.income=parseFloat(S.modal.val)||0;save();clModal();toast('Renda atualizada!');}

function toast(msg){setTimeout(()=>{const t=document.getElementById('toast');if(t){t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2500);}},50);}

R();
</script>
</body>
</html>
